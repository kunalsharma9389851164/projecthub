
<!DOCTYPE html>
<html>
<head>
<title>Profile Card</title>

<style>

body{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#0f172a;
font-family:Arial;
}

.card{
background:#1e293b;
padding:30px;
width:250px;
text-align:center;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.5);
}

.card img{
width:100px;
height:100px;
border-radius:50%;
margin-bottom:15px;
}

.card h2{
margin:10px 0;
}

.card p{
color:#cbd5f5;
}

.btn{
display:inline-block;
margin-top:10px;
padding:8px 15px;
background:#3b82f6;
color:white;
text-decoration:none;
border-radius:5px;
}

.btn:hover{
background:#2563eb;
}

</style>

</head>
<body>

<div class="card">

<img src="https://via.placeholder.com/100" alt="profile">

<h2>Kunal Sharma</h2>

<p>Web Developer</p>

<a href="#" class="btn">Follow</a>

</div>

</body>
</html>
