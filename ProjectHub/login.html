
<!DOCTYPE html>
<html>
<head>
<title>Login Form</title>
<link rel="stylesheet" href="css/style.css">

<style>
body{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#0f172a;
}

.login-box{
background:#1e293b;
padding:30px;
border-radius:10px;
width:300px;
text-align:center;
}

.login-box h2{
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:none;
border-radius:5px;
}

button{
width:100%;
padding:10px;
background:#3b82f6;
border:none;
color:white;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#2563eb;
}
</style>

</head>
<body>

<div class="login-box">
<h2>Login</h2>

<input type="text" placeholder="Username">
<input type="password" placeholder="Password">

<button>Login</button>

</div>

</body>
</html>
