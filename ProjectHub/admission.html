<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>College Admission Form</title>
</head>

<body>

  <h1>College Admission Form</h1>
  <hr>

  <form>
    <h3>Student Details</h3>

    Address:<br>
    <textarea rows="4" cols="40"></textarea><br><br>

    <button type="submit">Submit</button>
  </form>
<script src="js/script.js"></script>
</body>
</html>
