```html id="btn_code"
<!DOCTYPE html>
<html lang="en">
<head>
  <script src="js/script.js"></script>
  <meta charset="UTF-8">
  <title>Animated Button</title>
  <style>
    
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #0d1117;
    }

    .btn {
      padding: 15px 30px;
      font-size: 18px;
      color: white;
      background: #58a6ff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      background: #1f6feb;
      transform: scale(1.1);
      box-shadow: 0 0 20px #58a6ff;
    }
  </style>
</head>
<body>

  <button class="btn">Hover Me</button>
<script src="js/script.js"></script>
</body>
</html>
