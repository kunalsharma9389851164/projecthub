```html id="gallery_code"
<!DOCTYPE html>
<html lang="en">
<head>
  <script src="js/script.js"></script>
  <meta charset="UTF-8">
  <title>Image Gallery</title>
  <style>
    body {
      background: #0d1117;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 20px;
      padding: 40px;
    }

    img {
      width: 250px;
      border-radius: 10px;
      transition: 0.3s;
    }

    img:hover {
      transform: scale(1.1);
      box-shadow: 0 0 15px #58a6ff;
    }
  </style>
</head>
<body>

  <img src="https://via.placeholder.com/250" alt="">
  <img src="https://via.placeholder.com/250" alt="">
  <img src="https://via.placeholder.com/250" alt="">
<script src="js/script.js"></script>
</body>
</html>
